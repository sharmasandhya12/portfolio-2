<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login Clone</title>
    <link rel="stylesheet" href="facebook.css">
</head>
<body>
    <div id="parent">

        <div id="title">
            <h1>facebook</h1>
        </div>

        <div id="box">
            <div class="miniTitle">Log in to Facebook</div>

            <div id="inputs">
                <form action="">
                    <input class="ipField" type="text" name="email" id="email" placeholder="Email address or phone number"><br><br>

                    <input class="ipField" type="password" name="password" id="password" placeholder="Password"><br><br>

                    <input class="submit" type="submit" value="Log in">
                </form>
            </div>

            <div class="links">
                <a href="https://www.facebook.com/recover/initiate/?ars=facebook_login&cancel_lara_pswd=0" target="_blank">Forgotten account?</a>
                <br><br>
                <a href="https://www.facebook.com/r.php?locale=en_GB&display=page" target="_blank">Sign up for Facebook</a>
            </div>

        </div>
    </div>
</body>
</html>
